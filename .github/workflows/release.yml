name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # npm publish runs the prepublishOnly script (typecheck + test + build)
      # automatically; the test suite compiles real LaTeX via this binary.
      - name: Cache Tectonic binary
        uses: actions/cache@v4
        with:
          path: bin/tectonic
          key: tectonic-0.15.0-${{ runner.os }}

      - run: node scripts/download-tectonic.mjs

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
