name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      # The test suite compiles real LaTeX via a bundled Tectonic binary
      # (gitignored, not committed) rather than mocking compilation.
      - name: Cache Tectonic binary
        uses: actions/cache@v4
        with:
          path: bin/tectonic
          key: tectonic-0.15.0-${{ runner.os }}

      - run: node scripts/download-tectonic.mjs

      - run: npm test

      - run: npm run build

      # `platex/client` must stay edge-safe: the built bundle may never pull
      # in a Node built-in (see tsup.config.ts and CONTRIBUTING.md).
      - name: Verify edge bundle has no node: imports
        run: |
          if grep -nE "[\"']node:" dist/client.js dist/client.cjs; then
            echo "::error::dist/client.* imports Node built-ins — platex/client must stay edge-safe"
            exit 1
          fi

      # Smoke-test the built CLI end-to-end (real Tectonic compile).
      - name: Smoke-test CLI
        run: |
          printf '\\documentclass{article}\\begin{document}CI smoke test\\end{document}\n' > /tmp/smoke.tex
          node dist/cli.js /tmp/smoke.tex -o /tmp/smoke.pdf
          head -c 5 /tmp/smoke.pdf | grep -q '%PDF-'
