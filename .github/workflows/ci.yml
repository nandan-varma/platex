name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      # The test suite compiles real LaTeX via a bundled Tectonic binary
      # (gitignored, not committed) rather than mocking compilation.
      - name: Cache Tectonic binary
        uses: actions/cache@v4
        with:
          path: bin/tectonic
          key: tectonic-0.15.0-${{ runner.os }}

      - run: node scripts/download-tectonic.mjs

      - run: npm test

      - run: npm run build
