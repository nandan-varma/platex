services:
  platex:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      # Uncomment to require `Authorization: Bearer <key>` on POST /compile —
      # recommended if this service is reachable outside a trusted network.
      # PLATEX_API_KEY: "change-me"
      # Max simultaneous compiles; tune alongside the cpus/memory limits below.
      # PLATEX_MAX_CONCURRENT: "4"
      # Input-size ceilings — override the compiled-in defaults (5MB / 50 files / 25MB).
      # PLATEX_MAX_SOURCE_BYTES: "5000000"
      # PLATEX_MAX_FILES_COUNT: "50"
      # PLATEX_MAX_TOTAL_FILES_BYTES: "25000000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
